name: Deploy to Web Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run test script
        shell: pwsh
        run: ./test.ps1

      - name: Deploy to webroot
        shell: pwsh
        run: |
          Copy-Item -Path ./* -Destination C:\webroot -Recurse -Force